version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    open-pull-requests-limit: 10
    cooldown:
      # Wait seven days for dependency update pr's
      # When a dependency is vulnrable GitHub ignores the cooldown and create a PR immediately
      default-days: 7
    schedule:
      interval: "weekly"
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      major:
        update-types:
          - "major"
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
          - "*"
